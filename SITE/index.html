<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xdutk | Bio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="main-wrapper">
        <div id="bio-card" class="bio-card draggable">
            <div class="card-header">
                <div class="dots">
                    <span class="dot red" id="red-dot-bio"></span>
                    <span class="dot yellow" id="yellow-dot-bio"></span>
                    <span class="dot green" id="green-dot-bio"></span>
                </div>
                <span class="header-title">profile.exe</span>
            </div>
            <div class="card-content">
                <div class="avatar-container" id="main-avatar">
                    <img src="avatar.png" alt="xdutk" class="avatar-img">
                </div>
                <h1>xdutk</h1>
                <div class="age-badge">Мені <span id="age">12</span> років</div>
                <div class="links-grid">
                    <a href="https://t.me/xdutk" target="_blank" class="liquid-btn">
                        <i class="fab fa-telegram-plane"></i> Telegram
                    </a>
                    <a href="https://steamcommunity.com/profiles/76561199841630286/" target="_blank" class="liquid-btn">
                        <i class="fab fa-steam"></i> Steam Profile
                    </a>
                </div>
            </div>
        </div>

        <div id="music-player" class="bio-card music-widget draggable">
            <div class="card-header">
                <div class="dots">
                    <span class="dot red" id="red-dot-player"></span>
                    <span class="dot yellow" id="yellow-dot-player"></span>
                    <span class="dot green" id="green-dot-player"></span>
                </div>
                <span class="header-title">player.exe</span>
            </div>
            <div class="player-content">
                <div class="track-info">
                    <i class="fas fa-compact-disc fa-spin"></i>
                    <span id="track-name">music.mp3</span>
                </div>
                <input type="range" id="progress-slider" min="0" max="100" value="0">
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="controls">
                    <button id="play-pause" class="old-play-btn"><i class="fas fa-play"></i></button>
                    <div class="volume-box">
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
                    </div>
                </div>
            </div>
            <audio id="bg-audio" src="music.mp3" loop preload="auto"></audio>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
