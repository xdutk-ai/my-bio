<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xdutk | Bio - Extended Code Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="smoke-global-container"></div>
    <canvas id="garland-canvas"></canvas>

    <div class="main-wrapper">
        <div id="bio-card" class="bio-card">
            <div class="card-header" id="bio-handle">
                <div class="dots-container">
                    <div class="dots-wrapper">
                        <span class="dot red-dot" onclick="closeWin('bio-card')"></span>
                        <span class="dot yellow-dot" onclick="collapseWin('bio-card')"></span>
                        <span class="dot green-dot" id="green-dot-trigger" onclick="celebrateRandom()"></span>
                    </div>
                </div>
                <div class="header-text-area">
                    <span class="header-title-text">C:\Users\xdutk\profile.exe</span>
                </div>
            </div>
            
            <div class="content-anim-wrapper">
                <div class="card-content-inner">
                    <div id="main-avatar-container" class="avatar-frame-circle" 
                         onmousedown="startRage(event)" 
                         onmouseup="stopRage()" 
                         onmouseleave="stopRage()"
                         ontouchstart="startRage(event)" 
                         ontouchend="stopRage()">
                        <div class="avatar-images-stack">
                            <img src="avatar.png" alt="xdutk" id="avatar-normal" class="avatar-img-layer visible-layer" draggable="false">
                            <img src="angryavatar.jpg" alt="xdutk angry" id="avatar-angry" class="avatar-img-layer hidden-layer" draggable="false">
                        </div>
                    </div>

                    <h1 class="user-nickname">xdutk</h1>
                    <div class="user-age-badge">Мені 12 років</div>
                    
                    <div class="links-navigation-grid">
                        <a href="https://t.me/xdutk" target="_blank" class="navigation-liquid-btn">
                            <i class="fab fa-telegram-plane"></i> <span class="btn-text">Telegram</span>
                        </a>
                        <button class="navigation-liquid-btn" onclick="copyCrosshair(this)">
                            <i class="fas fa-crosshairs"></i> <span class="btn-text">Приціл CS</span>
                            <span class="copy-success-tooltip">Скопійовано!</span>
                        </button>
                        <a href="https://drive.google.com/uc?export=download&id=1og3EIBfLlzkgD0lJ263zr8THlrRXuH_3" class="navigation-liquid-btn">
                            <i class="fas fa-file-archive"></i> <span class="btn-text">Збірка Майн</span>
                        </a>
                        <a href="https://steamcommunity.com/profiles/76561199841630286/" target="_blank" class="navigation-liquid-btn">
                            <i class="fab fa-steam"></i> <span class="btn-text">Steam</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div id="music-player-window" class="bio-card music-widget-compact">
            <div class="card-header" id="player-handle">
                <div class="dots-container">
                    <div class="dots-wrapper">
                        <span class="dot red-dot" onclick="closeWin('music-player-window')"></span>
                        <span class="dot yellow-dot" onclick="collapseWin('music-player-window')"></span>
                    </div>
                </div>
                <div class="header-text-area">
                    <span class="header-title-text">media_player.exe</span>
                </div>
            </div>
            
            <div class="content-anim-wrapper">
                <div class="player-body-content">
                    <div class="player-controls-row">
                        <button id="play-pause-toggle" class="circular-play-btn"><i class="fas fa-play" id="play-icon"></i></button>
                        <div class="track-meta-data">
                            <div class="scrolling-text-container"><span id="current-track-name">background_ambient_music.mp3</span></div>
                            <div class="track-timer-display"><span id="current-time-val">0:00</span> / <span id="total-duration-val">0:00</span></div>
                        </div>
                    </div>
                    <div class="player-sliders-column">
                        <div class="slider-group">
                            <label class="slider-label">Progress</label>
                            <input type="range" id="track-progress-slider" class="custom-range-input" min="0" max="100" value="0">
                        </div>
                        <div class="slider-group">
                            <label class="slider-label">Volume</label>
                            <input type="range" id="track-volume-slider" class="custom-range-input" min="0" max="1" step="0.01" value="0.5">
                        </div>
                    </div>
                </div>
            </div>
            <audio id="background-audio-element" src="music.mp3" loop></audio>
        </div>
    </div>
    <script src="garland.js"></script>
    <script src="script.js"></script>
</body>
</html>
