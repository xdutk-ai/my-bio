<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xdutk | Bio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <canvas id="garland-canvas"></canvas>

    <div class="main-wrapper">
        <div id="bio-card" class="bio-card">
            <div class="card-header" id="bio-handle">
                <div class="dots">
                    <span class="dot red" onclick="toggleWin('bio-card')"></span>
                    <span class="dot yellow" onclick="toggleWin('bio-card')"></span>
                    <span class="dot green" onclick="celebrateRandom()"></span>
                </div>
                <span class="header-title">profile.exe</span>
            </div>
            <div class="card-content">
                <div id="main-avatar" class="avatar-container-circle" onclick="clickAvatar()">
                    <img src="avatar.png" alt="xdutk" class="avatar-img">
                </div>
                <h1>xdutk</h1>
                <div class="age-badge">Мені 12 років</div>
                <div class="links-grid">
                    <a href="https://t.me/xdutk" target="_blank" class="liquid-btn">
                        <i class="fab fa-telegram-plane"></i> Telegram
                    </a>
                    <button class="liquid-btn" onclick="copyCrosshair()">
                        <i class="fas fa-crosshairs"></i> Приціл CS
                    </button>
                    <a href="https://drive.google.com/uc?export=download&id=1og3EIBfLlzkgD0lJ263zr8THlrRXuH_3" class="liquid-btn">
                        <i class="fas fa-file-archive"></i> Збірка Майн
                    </a>
                    <a href="https://steamcommunity.com/profiles/76561199841630286/" target="_blank" class="liquid-btn">
                        <i class="fab fa-steam"></i> Steam
                    </a>
                </div>
            </div>
        </div>

        <div id="music-player" class="bio-card music-widget">
            <div class="card-header" id="player-handle">
                <div class="dots">
                    <span class="dot red" onclick="toggleWin('music-player')"></span>
                    <span class="dot yellow" onclick="toggleWin('music-player')"></span>
                    <span class="dot green" onclick="celebrateRandom()"></span>
                </div>
                <span class="header-title">player.exe</span>
            </div>
            <div class="player-content">
                <div class="player-row">
                    <button id="play-pause" class="old-play-btn"><i class="fas fa-play"></i></button>
                    <div class="track-info-mini">
                        <span id="track-name">music.mp3</span>
                        <div class="time-mini"><span id="current-time">0:00</span> / <span id="duration">0:00</span></div>
                    </div>
                </div>
                <input type="range" id="progress-slider" min="0" max="100" value="0">
                <div class="volume-row">
                    <i class="fas fa-volume-down" style="font-size: 10px; opacity: 0.5;"></i>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
                </div>
            </div>
            <audio id="bg-audio" src="music.mp3" loop></audio>
        </div>
    </div>
    <script src="garland.js"></script> <script src="script.js"></script>
</body>
</html>
